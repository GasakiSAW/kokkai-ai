<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>発言全文</title>
</head>
<body>

<h1>{{ speech.speaker }}</h1>

<p>
    <b>日付:</b> {{ speech.date }}<br>
    <b>会議:</b> {{ speech.meeting }}
</p>

<hr>

<h2>発言全文</h2>

<p style="white-space: pre-wrap;">{{ speech.speech }}</p>

<hr>

<p>
    <a href="/analyze/{{ speech_id }}?from_date={{ from_date }}&until_date={{ until_date }}&keyword={{ keyword }}">
        <button>AI分析を実行する</button>
    </a>
</p>

<p>
    <a href="/">ホームへ戻る</a>
</p>

</body>
</html>
